name: Scrape Delaware Outages

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        run: python scrape_outages.py
        env:
          OUTPUT_DIR: data

      - name: Commit and push
        run: |
          git config user.name "Outage Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/outages.geojson
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update outage data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
