<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delaware Outage Map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; min-height: 100vh; padding: 16px; }
    button { font-family: inherit; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef } = React;

const API = "https://outagemap-worker.adukes40.workers.dev";
const POLL_MS = 60000;
const W = 520, H = 640;
const DE_BOUNDS = { minLat: 38.3, maxLat: 39.85, minLng: -75.85, maxLng: -74.9 };
const SOURCES = {
  delmarva: { label: "Delmarva Power",         color: "#f97316" },
  dec:      { label: "Delaware Electric Coop", color: "#3b82f6" },
};

const DEC_POLY = {
  1:{lat:39.173543,lng:-75.474665,name:"19901"},4:{lat:39.177654,lng:-75.596458,name:"19904"},
  8:{lat:38.736161,lng:-75.611068,name:"19933"},9:{lat:39.082689,lng:-75.630143,name:"19934"},
  10:{lat:39.258982,lng:-75.699584,name:"19938"},12:{lat:38.554538,lng:-75.242321,name:"19939"},
  13:{lat:38.478255,lng:-75.564803,name:"19940"},14:{lat:38.792524,lng:-75.425359,name:"19941"},
  16:{lat:39.006142,lng:-75.605251,name:"19943"},18:{lat:38.506858,lng:-75.210085,name:"19945"},
  20:{lat:39.028289,lng:-75.452907,name:"19946"},21:{lat:38.672036,lng:-75.395831,name:"19947"},
  22:{lat:38.819836,lng:-75.596968,name:"19950"},23:{lat:38.69066,lng:-75.250138,name:"19951"},
  24:{lat:38.913511,lng:-75.625369,name:"19952"},25:{lat:39.153546,lng:-75.696448,name:"19953"},
  26:{lat:38.900146,lng:-75.520167,name:"19954"},28:{lat:38.547128,lng:-75.541285,name:"19956"},
  30:{lat:38.73882,lng:-75.175708,name:"19958"},31:{lat:38.85238,lng:-75.404257,name:"19960"},
  32:{lat:39.069313,lng:-75.490243,name:"19962"},33:{lat:38.93537,lng:-75.380968,name:"19963"},
  34:{lat:39.093826,lng:-75.722951,name:"19964"},35:{lat:38.574432,lng:-75.296914,name:"19966"},
  37:{lat:38.54581,lng:-75.119451,name:"19967"},38:{lat:38.775087,lng:-75.28859,name:"19968"},
  39:{lat:38.556886,lng:-75.10543,name:"19970"},41:{lat:38.713215,lng:-75.109243,name:"19971"},
  42:{lat:38.638359,lng:-75.613726,name:"19973"},43:{lat:38.468071,lng:-75.193911,name:"19975"},
  48:{lat:39.296083,lng:-75.562736,name:"19977"},49:{lat:39.047756,lng:-75.574031,name:"19979"},
};

function decodePolyline(encoded) {
  let idx = 0, lat = 0, lng = 0;
  const coords = [];
  while (idx < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : result >> 1;
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : result >> 1;
    coords.push([lat / 1e5, lng / 1e5]);
  }
  return coords;
}

function normalizeDelmarva(outages) {
  return (outages ?? []).map(o => {
    const coords = o.geom?.p?.[0] ? decodePolyline(o.geom.p[0]) : [];
    const [lat, lng] = coords[0] ?? [null, null];
    return {
      id: "delmarva-" + o.id, utility: "delmarva", lat, lng,
      customers: o.desc?.cust_a?.val ?? 0,
      count: o.desc?.n_out ?? 1,
      etr: o.desc?.etr === "ETR-NULL" ? "Unknown" : (o.desc?.etr ?? "Unknown"),
      cause: o.desc?.cause ?? "Unknown",
      crew: o.desc?.crew_status ?? null,
      start: o.desc?.start_time ?? null,
    };
  }).filter(o => o.lat && o.lng);
}

function normalizeDEC(rows) {
  return (rows ?? []).map(o => {
    const poly = DEC_POLY[o.ref] ?? {};
    return {
      id: "dec-" + o.ref, utility: "dec",
      lat: poly.lat ?? null, lng: poly.lng ?? null,
      customers: o.affected ?? 0,
      count: 1, etr: "Unknown", cause: "Unknown",
      crew: null, start: null, zip: poly.name ?? String(o.ref),
    };
  }).filter(o => o.lat && o.lng);
}

function project(lat, lng) {
  return {
    x: ((lng - DE_BOUNDS.minLng) / (DE_BOUNDS.maxLng - DE_BOUNDS.minLng)) * W,
    y: ((DE_BOUNDS.maxLat - lat)  / (DE_BOUNDS.maxLat - DE_BOUNDS.minLat)) * H,
  };
}

function App() {
  const [outages, setOutages] = useState([]);
  const [filter, setFilter]   = useState({ delmarva: true, dec: true });
  const [hovered, setHovered] = useState(null);
  const [status, setStatus]   = useState({ delmarva: "idle", dec: "idle" });
  const [lastPoll, setLastPoll] = useState(null);
  const [log, setLog]         = useState([]);
  const logRef = useRef([]);

  const addLog = (msg) => {
    const line = "[" + new Date().toLocaleTimeString() + "] " + msg;
    logRef.current = [line, ...logRef.current.slice(0, 14)];
    setLog([...logRef.current]);
  };

  const fetchDelmarva = useCallback(async () => {
    setStatus(s => ({ ...s, delmarva: "loading" }));
    addLog("Fetching Delmarva...");
    try {
      const r = await fetch(API + "/delmarva/detail");
      const d = await r.json();
      const norm = normalizeDelmarva(d.outages);
      setOutages(p => [...p.filter(o => o.utility !== "delmarva"), ...norm]);
      setStatus(s => ({ ...s, delmarva: "ok" }));
      addLog("✓ Delmarva: " + norm.length + " clusters, " + norm.reduce((a,o)=>a+o.customers,0).toLocaleString() + " customers");
    } catch(e) {
      setStatus(s => ({ ...s, delmarva: "error" }));
      addLog("✗ Delmarva: " + e.message);
    }
  }, []);

  const fetchDEC = useCallback(async () => {
    setStatus(s => ({ ...s, dec: "loading" }));
    addLog("Fetching DEC...");
    try {
      const r = await fetch(API + "/dec/outages?tiles=1,0");
      const d = await r.json();
      const rows = Array.isArray(d) ? d : (d.items ?? d.outages ?? []);
      const norm = normalizeDEC(rows);
      setOutages(p => [...p.filter(o => o.utility !== "dec"), ...norm]);
      setStatus(s => ({ ...s, dec: "ok" }));
      addLog("✓ DEC: " + norm.length + " zones, " + norm.reduce((a,o)=>a+o.customers,0).toLocaleString() + " customers");
    } catch(e) {
      setStatus(s => ({ ...s, dec: "error" }));
      addLog("✗ DEC: " + e.message);
    }
  }, []);

  const fetchAll = useCallback(async () => {
    await Promise.all([fetchDelmarva(), fetchDEC()]);
    setLastPoll(new Date());
  }, [fetchDelmarva, fetchDEC]);

  useEffect(() => { fetchAll(); }, []);
  useEffect(() => { const t = setInterval(fetchAll, POLL_MS); return () => clearInterval(t); }, [fetchAll]);

  const visible = outages.filter(o => filter[o.utility]);
  const totals = {
    delmarva: outages.filter(o=>o.utility==="delmarva").reduce((a,o)=>a+o.customers,0),
    dec:      outages.filter(o=>o.utility==="dec").reduce((a,o)=>a+o.customers,0),
  };

  return React.createElement("div", { style: { padding: 16 } },
    // Header
    React.createElement("div", { style: { marginBottom: 12 } },
      React.createElement("h1", { style: { fontSize: 20, fontWeight: 700 } }, "⚡ Delaware Outage Map"),
      React.createElement("p", { style: { marginTop: 3, fontSize: 12, color: "#94a3b8" } },
        "Delmarva Power + Delaware Electric Coop · Auto-refreshes every 60s" +
        (lastPoll ? " · Updated " + lastPoll.toLocaleTimeString() : "")
      )
    ),
    // Toggles
    React.createElement("div", { style: { display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap", alignItems: "center" } },
      ...Object.entries(SOURCES).map(([key, src]) =>
        React.createElement("button", {
          key, onClick: () => setFilter(f => ({ ...f, [key]: !f[key] })),
          style: { display:"flex", alignItems:"center", gap:8, padding:"6px 14px",
            borderRadius:8, border:"2px solid "+src.color,
            background: filter[key] ? src.color+"22" : "transparent",
            color:"#f1f5f9", fontSize:12, fontWeight:600 }
        },
          React.createElement("span", { style: { width:10, height:10, borderRadius:"50%",
            background: filter[key] ? src.color : "#334155", display:"inline-block" }}),
          src.label,
          React.createElement("span", { style: { color:"#94a3b8", fontWeight:400 } },
            " " + totals[key].toLocaleString() + " affected"),
          status[key]==="loading" ? " ⏳" : status[key]==="error" ? " ⚠️" : status[key]==="ok" ?
            React.createElement("span", { style:{color:"#86efac"} }, " ●") : ""
        )
      ),
      React.createElement("button", {
        onClick: fetchAll,
        style: { marginLeft:"auto", padding:"6px 12px", borderRadius:8,
          border:"1px solid #334155", background:"#1e293b", color:"#94a3b8", fontSize:11 }
      }, "↻ Refresh")
    ),
    // Map + Log
    React.createElement("div", { style: { display:"flex", gap:16, flexWrap:"wrap" } },
      // SVG Map
      React.createElement("div", { style: { position:"relative", flexShrink:0 } },
        React.createElement("svg", { width:W, height:H,
          style: { background:"#172554", borderRadius:12, border:"1px solid #1e3a5f", display:"block" } },
          // Grid lines
          ...[38.5,39.0,39.5].map(lat => {
            const {y}=project(lat,-75);
            return React.createElement("line",{key:"h"+lat,x1:0,y1:y,x2:W,y2:y,stroke:"#1e3a5f",strokeWidth:1,strokeDasharray:"4 3"});
          }),
          ...[{l:"Kent Co.",lat:39.15,lng:-75.52},{l:"Sussex Co.",lat:38.62,lng:-75.35},{l:"New Castle",lat:39.65,lng:-75.55}].map(c => {
            const p=project(c.lat,c.lng);
            return React.createElement("text",{key:c.l,x:p.x,y:p.y,textAnchor:"middle",fill:"#1e40af",fontSize:11,fontWeight:"600",pointerEvents:"none"},c.l);
          }),
          // Outage dots
          ...visible.map(o => {
            if (!o.lat||!o.lng) return null;
            const {x,y}=project(o.lat,o.lng);
            if (x<0||x>W||y<0||y>H) return null;
            const col=SOURCES[o.utility]?.color??"#ccc";
            const r=Math.max(5,Math.min(24,Math.sqrt(o.customers||1)*0.7));
            const isH=hovered?.id===o.id;
            return React.createElement("g", { key:o.id, style:{cursor:"pointer"},
              onMouseEnter:()=>setHovered(o), onMouseLeave:()=>setHovered(null) },
              isH && React.createElement("circle",{cx:x,cy:y,r:r+6,fill:col,fillOpacity:0.15}),
              React.createElement("circle",{cx:x,cy:y,r,fill:col,fillOpacity:isH?0.95:0.72,
                stroke:isH?"#fff":col,strokeWidth:isH?2:0.5}),
              r>13 && React.createElement("text",{x,y:y+4,textAnchor:"middle",fill:"#fff",fontSize:9,fontWeight:"700",pointerEvents:"none"},
                o.customers>=1000?(o.customers/1000).toFixed(1)+"k":o.customers)
            );
          }).filter(Boolean)
        ),
        // Tooltip
        hovered && (()=>{
          const {x,y}=project(hovered.lat,hovered.lng);
          const col=SOURCES[hovered.utility]?.color??"#ccc";
          return React.createElement("div", {
            style:{ position:"absolute", left:Math.min(x+14,W-190), top:Math.max(y-80,4),
              background:"#0f172a", border:"1px solid "+col, borderRadius:10,
              padding:"10px 14px", fontSize:12, pointerEvents:"none", width:185, zIndex:10,
              boxShadow:"0 4px 24px rgba(0,0,0,.6)" }},
            React.createElement("div",{style:{fontWeight:700,color:col,marginBottom:5}},SOURCES[hovered.utility]?.label),
            React.createElement("div",null,React.createElement("span",{style:{fontSize:18,fontWeight:700}},hovered.customers.toLocaleString())," customers"),
            hovered.count>1 && React.createElement("div",{style:{color:"#94a3b8"}},hovered.count+" outages clustered"),
            hovered.zip && React.createElement("div",{style:{color:"#94a3b8"}},"ZIP: "+hovered.zip),
            hovered.cause!=="Unknown" && React.createElement("div",{style:{color:"#94a3b8"}},"Cause: "+hovered.cause),
            React.createElement("div",{style:{color:hovered.etr==="Unknown"?"#64748b":"#fbbf24",marginTop:4}},
              "ETR: "+(hovered.etr==="Unknown"?"Not available":new Date(hovered.etr).toLocaleTimeString())),
            hovered.start && React.createElement("div",{style:{color:"#475569",fontSize:10,marginTop:3}},
              "Since "+new Date(hovered.start).toLocaleTimeString())
          );
        })()
      ),
      // Log panel
      React.createElement("div", {
        style:{ flex:1, minWidth:200, background:"#1e293b", borderRadius:10,
          padding:"12px 14px", fontSize:11, fontFamily:"monospace" }},
        React.createElement("div",{style:{fontWeight:700,fontSize:12,fontFamily:"system-ui",marginBottom:8,color:"#f1f5f9"}},"Activity Log"),
        ...log.map((l,i) =>
          React.createElement("div",{key:i,style:{
            color:l.includes("✓")?"#86efac":l.includes("✗")?"#fca5a5":"#64748b",
            lineHeight:1.9, borderBottom:"1px solid #0f172a", paddingBottom:2}},l)
        ),
        log.length===0 && React.createElement("div",{style:{color:"#334155"}},"Loading...")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
