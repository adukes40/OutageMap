<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Delaware Power Outage Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e1a;color:#e0e6f0;overflow:hidden;height:100vh}
#map{width:100%;height:100vh}
.hdr{position:absolute;top:0;left:0;right:0;z-index:1000;background:linear-gradient(180deg,rgba(10,14,26,.97),rgba(10,14,26,.85) 80%,transparent);padding:12px 16px 22px;pointer-events:none}
.hdr>*{pointer-events:auto}
.hdr h1{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline}
.badge{font-size:.6rem;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle;margin-left:8px}
.b-live{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);animation:pulse 2s infinite}
.b-stale{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.b-err{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.st{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:5px 12px;display:flex;align-items:center;gap:6px}
.st b{font-size:1.1rem;color:#fff}
.st span{font-size:.65rem;color:#94a3b8;text-transform:uppercase}
.ts{font-size:.65rem;color:#64748b;margin-top:6px}
.panel{position:absolute;top:88px;right:12px;z-index:1000;width:320px;max-height:calc(100vh - 100px);overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.card{background:rgba(15,23,42,.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.card:hover{border-color:rgba(96,165,250,.4);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.prov{font-size:.6rem;padding:2px 7px;border-radius:5px;font-weight:600}
.prov-d{background:rgba(59,130,246,.2);color:#60a5fa}
.prov-e{background:rgba(168,85,247,.2);color:#c084fc}
.card-n{font-size:1.2rem;font-weight:800;color:#fff}
.card-r{display:flex;justify-content:space-between;font-size:.72rem;padding:2px 0}
.card-r .l{color:#64748b}
.card-r .v{color:#cbd5e1;font-weight:500}
.legend{position:absolute;bottom:16px;left:12px;z-index:1000;background:rgba(15,23,42,.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;font-size:.75rem}
.legend h3{font-size:.65rem;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.lg-i{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:#cbd5e1}
.lg-d{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lg-p{display:flex;align-items:center;gap:7px;margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,.07);color:#cbd5e1}
.lg-l{width:12px;height:3px;border-radius:2px;flex-shrink:0}
.leaflet-popup-content-wrapper{background:rgba(15,23,42,.95)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important;color:#e0e6f0!important}
.leaflet-popup-tip{background:rgba(15,23,42,.95)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:.82rem;line-height:1.6}
.pp-t{font-weight:700;font-size:.95rem;margin-bottom:4px}
.pp-p{font-size:.65rem;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block;margin-bottom:6px}
.pp-r{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pp-r:last-child{border:none}
.pp-l{color:#64748b}
.pp-v{font-weight:600;color:#fff}
.dec-tooltip{background:rgba(15,23,42,.95)!important;border:1px solid rgba(168,85,247,.3)!important;border-radius:8px!important;color:#e0e6f0!important;padding:8px 12px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.dec-tooltip .leaflet-tooltip-top:before,.dec-tooltip.leaflet-tooltip-bottom:before{border-top-color:rgba(168,85,247,.3)!important}
.rbtn{position:absolute;bottom:16px;right:12px;z-index:1000;background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.3);color:#60a5fa;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:600;transition:all .2s;backdrop-filter:blur(10px)}
.rbtn:hover{background:rgba(59,130,246,.35)}
.empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;text-align:center;background:rgba(15,23,42,.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:32px 40px;display:none}
.empty h2{font-size:1.1rem;margin-bottom:8px;color:#fff}
.empty p{font-size:.82rem;color:#94a3b8;line-height:1.6;max-width:340px}
@media(max-width:640px){.panel{display:none}.hdr h1{font-size:1rem}.st{padding:4px 8px}.st b{font-size:.9rem}}
</style>
</head>
<body>
<div id="map"></div>

<div class="hdr">
  <div>
    <h1>⚡ Delaware Power Outages</h1>
    <span id="badge" class="badge b-err">Loading...</span>
  </div>
  <div class="stats">
    <div class="st"><b id="s-out">-</b><span>Outages</span></div>
    <div class="st"><b id="s-cust">-</b><span>Customers</span></div>
    <div class="st"><b id="s-dpl">-</b><span>Delmarva</span></div>
    <div class="st"><b id="s-dec">-</b><span>DEC</span></div>
  </div>
  <div class="ts" id="ts"></div>
</div>

<div class="panel" id="panel"></div>

<div class="legend">
  <h3>Severity</h3>
  <div class="lg-i"><div class="lg-d" style="background:#34d399"></div>1–100 customers</div>
  <div class="lg-i"><div class="lg-d" style="background:#fbbf24"></div>101–500</div>
  <div class="lg-i"><div class="lg-d" style="background:#f87171"></div>501–2,000</div>
  <div class="lg-i"><div class="lg-d" style="background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5)"></div>2,000+</div>
  <div class="lg-p"><div class="lg-l" style="background:#3b82f6"></div>Delmarva Power</div>
  <div class="lg-p"><div class="lg-l" style="background:#a855f7"></div>DE Electric Co-op</div>
</div>

<button class="rbtn" onclick="loadData()">↻ Refresh</button>
<div class="empty" id="empty">
  <h2>No Active Outages</h2>
  <p>All clear in Delaware! Data refreshes every 5 minutes.</p>
</div>

<script>
const API = "https://outagemap-worker.adukes40.workers.dev";

// ── Google Encoded Polyline decoder ──
function decodePoly(enc) {
  let idx = 0, lat = 0, lng = 0;
  const coords = [];
  while (idx < enc.length) {
    let b, shift = 0, result = 0;
    do { b = enc.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : result >> 1;
    shift = 0; result = 0;
    do { b = enc.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : result >> 1;
    coords.push([lat / 1e5, lng / 1e5]);
  }
  return coords; // [[lat,lng], ...]
}

// ── Parse Sienatech XML into a map of ref → [{latlngs}] ──
function parseDecRaw(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "text/xml");
  const polys = doc.querySelectorAll("poly");
  const out = {};
  polys.forEach(poly => {
    const id   = parseInt(poly.getAttribute("id"));
    const name = poly.getAttribute("name");
    const rings = poly.querySelectorAll("linearRing");
    const decoded = [];
    rings.forEach(ring => {
      const enc = ring.getAttribute("encoded");
      if (enc) decoded.push(decodePoly(enc));
    });
    out[id] = { name, rings: decoded };
  });
  return out;
}

// ── ZIP → county + city lookup ──
const ZIP_META = {
  "19901":{city:"Dover",county:"Kent"},
  "19902":{city:"Dover AFB",county:"Kent"},
  "19904":{city:"Dover",county:"Kent"},
  "19930":{city:"Bethany Beach",county:"Sussex"},
  "19931":{city:"Bishopville",county:"Sussex"},
  "19933":{city:"Bridgeville",county:"Sussex"},
  "19934":{city:"Camden Wyoming",county:"Kent"},
  "19938":{city:"Clayton",county:"Kent"},
  "19939":{city:"Dagsboro",county:"Sussex"},
  "19940":{city:"Delmar",county:"Sussex"},
  "19941":{city:"Ellendale",county:"Sussex"},
  "19943":{city:"Felton",county:"Kent"},
  "19944":{city:"Fenwick Island",county:"Sussex"},
  "19945":{city:"Frankford",county:"Sussex"},
  "19946":{city:"Frederica",county:"Kent"},
  "19947":{city:"Georgetown",county:"Sussex"},
  "19950":{city:"Greenwood",county:"Sussex"},
  "19951":{city:"Harbeson",county:"Sussex"},
  "19952":{city:"Harrington",county:"Kent"},
  "19953":{city:"Hartly",county:"Kent"},
  "19954":{city:"Houston",county:"Kent"},
  "19955":{city:"Kenton",county:"Kent"},
  "19956":{city:"Laurel",county:"Sussex"},
  "19958":{city:"Lewes",county:"Sussex"},
  "19960":{city:"Lincoln",county:"Sussex"},
  "19962":{city:"Magnolia",county:"Kent"},
  "19963":{city:"Milford",county:"Sussex"},
  "19964":{city:"Marydel",county:"Kent"},
  "19966":{city:"Millsboro",county:"Sussex"},
  "19967":{city:"Millville",county:"Sussex"},
  "19968":{city:"Milton",county:"Sussex"},
  "19970":{city:"Ocean View",county:"Sussex"},
  "19971":{city:"Rehoboth Beach",county:"Sussex"},
  "19973":{city:"Seaford",county:"Sussex"},
  "19975":{city:"Selbyville",county:"Sussex"},
  "19977":{city:"Smyrna",county:"Kent"},
  "19979":{city:"Viola",county:"Kent"},
  "19980":{city:"Woodside",county:"Kent"},
};

// ── Map setup ──
const map = L.map("map", {zoomControl:false, attributionControl:false}).setView([39.0,-75.5], 9);
L.control.zoom({position:"bottomleft"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {maxZoom:19, subdomains:"abcd"}).addTo(map);

// County outlines
const counties = {type:"FeatureCollection",features:[
  {type:"Feature",properties:{name:"New Castle"},geometry:{type:"Polygon",coordinates:[[[-75.79,39.72],[-75.64,39.84],[-75.41,39.80],[-75.34,39.72],[-75.41,39.56],[-75.51,39.45],[-75.58,39.46],[-75.70,39.51],[-75.76,39.58],[-75.79,39.72]]]}},
  {type:"Feature",properties:{name:"Kent"},geometry:{type:"Polygon",coordinates:[[[-75.70,39.24],[-75.58,39.46],[-75.51,39.45],[-75.41,39.38],[-75.34,39.26],[-75.32,39.15],[-75.35,39.05],[-75.41,38.97],[-75.52,38.97],[-75.63,39.02],[-75.70,39.10],[-75.70,39.24]]]}},
  {type:"Feature",properties:{name:"Sussex"},geometry:{type:"Polygon",coordinates:[[[-75.70,39.10],[-75.63,39.02],[-75.52,38.97],[-75.41,38.97],[-75.35,38.90],[-75.30,38.78],[-75.19,38.66],[-75.09,38.55],[-75.05,38.46],[-75.07,38.45],[-75.62,38.45],[-75.69,38.55],[-75.72,38.64],[-75.73,38.75],[-75.74,38.89],[-75.72,39.00],[-75.70,39.10]]]}}
]};
const cSty = {color:"rgba(148,163,184,0.25)",weight:1.5,fillColor:"rgba(30,41,59,0.15)",fillOpacity:0.4};
const cLayer = L.geoJSON(counties, {
  style: () => cSty,
  onEachFeature: (f, ly) => {
    ly.on("mouseover", () => { ly.setStyle({color:"rgba(96,165,250,0.4)",weight:2,fillColor:"rgba(30,58,138,0.25)",fillOpacity:0.5}); ly.bindTooltip(f.properties.name+" County",{sticky:true}).openTooltip(); });
    ly.on("mouseout",  () => { cLayer.resetStyle(ly); ly.closeTooltip(); });
  }
}).addTo(map);

const polyGroup   = L.layerGroup().addTo(map); // DEC polygons (bottom)
const markerGroup = L.layerGroup().addTo(map); // all markers (top)

// ── Helpers ──
function sev(n) {
  if (n > 2000) return {c:"#ef4444", fill:"rgba(239,68,68,0.22)", l:"Critical"};
  if (n > 500)  return {c:"#f87171", fill:"rgba(248,113,113,0.18)", l:"High"};
  if (n > 100)  return {c:"#fbbf24", fill:"rgba(251,191,36,0.16)", l:"Medium"};
  return           {c:"#34d399", fill:"rgba(52,211,153,0.14)", l:"Low"};
}
function fmt(iso) {
  if (!iso || iso === "ETR-NULL") return "Assessing";
  try { return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
  catch { return iso; }
}
function elapsed(iso) {
  if (!iso) return "";
  const m = Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if (m < 0) return "";
  return m < 60 ? m+"m ago" : Math.floor(m/60)+"h "+(m%60)+"m ago";
}
function centroid(latlngs) {
  const lat = latlngs.reduce((s,c)=>s+c[0],0)/latlngs.length;
  const lng = latlngs.reduce((s,c)=>s+c[1],0)/latlngs.length;
  return [lat, lng];
}

// ── Main load ──
async function loadData() {
  const badge = document.getElementById("badge");
  badge.textContent = "LOADING..."; badge.className = "badge b-stale";
  polyGroup.clearLayers(); markerGroup.clearLayers();

  try {
    // Fetch all 4 endpoints in parallel — dec/raw returns XML
    const [dplSummaryRes, dplDetailRes, decOutagesRes, decRawRes] = await Promise.all([
      fetch(`${API}/delmarva/outages`),
      fetch(`${API}/delmarva/detail`),
      fetch(`${API}/dec/outages?tiles=1,0`),
      fetch(`${API}/dec/raw?tiles=1,0`),
    ]);

    const dplSummary = await dplSummaryRes.json();
    const dplDetail  = await dplDetailRes.json();
    const decOutages = await decOutagesRes.json();
    const decRawXml  = await decRawRes.text();

    console.log("dplSummary:", JSON.stringify(dplSummary).slice(0,300));
    console.log("dplDetail:",  JSON.stringify(dplDetail).slice(0,300));
    console.log("decOutages:", JSON.stringify(decOutages).slice(0,300));

    // Parse DEC polygon geometry
    const decPolygons = parseDecRaw(decRawXml);

    const allItems = [];

    // ── DEC: draw real polygons ──
    const decList = Array.isArray(decOutages) ? decOutages : [];
    for (const o of decList) {
      const n    = o.affected || 0;
      const poly = decPolygons[o.ref];
      if (!poly || !poly.rings.length || !n) continue;

      const s = sev(n);

      // Build Leaflet polygon — rings[0] = outer, rings[1+] = holes
      const outerRing = poly.rings[0];
      const holeRings = poly.rings.slice(1);

      const lPoly = L.polygon(
        holeRings.length ? [outerRing, ...holeRings] : outerRing,
        {
          color: "#a855f7",
          weight: 2.5,
          opacity: 1,
          fillColor: s.c,
          fillOpacity: 0.45,
          className: "dec-poly"
        }
      ).addTo(polyGroup);

      const [cLat, cLng] = centroid(outerRing);
      const popupHtml = `
        <div class="pp-t">DE Electric Co-op — ZIP ${poly.name}</div>
        <span class="pp-p prov-e">DE Electric Co-op</span>
        <div class="pp-r"><span class="pp-l">Customers Affected</span><span class="pp-v" style="color:${s.c}">${n.toLocaleString()}</span></div>
        <div class="pp-r"><span class="pp-l">Severity</span><span class="pp-v">${s.l}</span></div>
        <div class="pp-r"><span class="pp-l">ZIP Code</span><span class="pp-v">${poly.name}</span></div>
      `;
      const meta = ZIP_META[poly.name] || {city:"—", county:"—"};
      const tooltipHtml = `
        <div style="font-size:.8rem;line-height:1.7">
          <div style="font-weight:700;font-size:.9rem;margin-bottom:3px;color:${s.c}">${meta.city}</div>
          <div style="color:#94a3b8;font-size:.7rem;margin-bottom:5px">${meta.county} County · ZIP ${poly.name}</div>
          <div style="display:flex;justify-content:space-between;gap:16px">
            <span style="color:#64748b">Customers</span>
            <span style="font-weight:700;color:${s.c}">${n.toLocaleString()}</span>
          </div>
          <div style="display:flex;justify-content:space-between;gap:16px">
            <span style="color:#64748b">Severity</span>
            <span style="font-weight:600;color:#fff">${s.l}</span>
          </div>
          <div style="display:flex;justify-content:space-between;gap:16px">
            <span style="color:#64748b">Provider</span>
            <span style="font-weight:600;color:#c084fc">DE Electric Co-op</span>
          </div>
        </div>`;
      lPoly.bindTooltip(tooltipHtml, {sticky:true, opacity:1, className:"dec-tooltip"});
      lPoly.on("mouseover", function() { this.setStyle({fillOpacity:0.65, weight:3}); });
      lPoly.on("mouseout",  function() { this.setStyle({fillOpacity:0.45, weight:2.5}); });



      allItems.push({lat:cLat, lng:cLng, n, provider:"DEC", pName:"DE Electric Co-op", zip:poly.name, s});
    }

    // ── Delmarva (Kubra) ──
    const dplOutages = dplDetail?.outages ?? (Array.isArray(dplDetail) ? dplDetail : []);
    for (const o of dplOutages) {
      const n = o.desc?.cust_a?.val ?? o.desc?.n_out ?? 0;
      if (!n) continue;
      const enc = o.geom?.p?.[0];
      if (!enc) continue;
      const coords = decodePoly(enc);
      if (!coords.length) continue;
      const [lat, lng] = coords[0];
      const s = sev(n);
      const etr = (!o.desc?.etr || o.desc.etr === "ETR-NULL") ? null : o.desc.etr;

      // Glow ring
      L.circle([lat,lng], {
        radius: Math.min(Math.max(n*3, 400), 8000),
        color: s.c, fillColor: s.c, fillOpacity: 0.06, weight: 0.5, opacity: 0.25
      }).addTo(polyGroup);

      const marker = L.circleMarker([lat,lng], {
        radius: Math.min(Math.max(7, n/70), 26),
        color: "#3b82f6", fillColor: s.c, fillOpacity: 0.85, weight: 2.5, opacity: 0.9
      }).addTo(markerGroup);

      marker.bindPopup(`
        <div class="pp-t">Delmarva Power Outage</div>
        <span class="pp-p prov-d">Delmarva Power</span>
        <div class="pp-r"><span class="pp-l">Customers</span><span class="pp-v" style="color:${s.c}">${n.toLocaleString()}</span></div>
        <div class="pp-r"><span class="pp-l">Severity</span><span class="pp-v">${s.l}</span></div>
        <div class="pp-r"><span class="pp-l">Cause</span><span class="pp-v">${o.desc?.cause||"Unknown"}</span></div>
        <div class="pp-r"><span class="pp-l">Started</span><span class="pp-v">${fmt(o.desc?.start_time)} ${elapsed(o.desc?.start_time)}</span></div>
        <div class="pp-r"><span class="pp-l">Est. Restore</span><span class="pp-v">${fmt(etr)}</span></div>
        <div class="pp-r"><span class="pp-l">ID</span><span class="pp-v" style="font-size:.7rem;color:#64748b">${o.id||"—"}</span></div>
      `, {maxWidth:280});

      allItems.push({lat, lng, n, provider:"Delmarva", pName:"Delmarva Power", cause:o.desc?.cause, start_time:o.desc?.start_time, etr, s});
    }

    // ── Stats ──
    const totals = dplSummary?.summaryFileData?.totals?.[0] ?? dplSummary?.totals?.[0];
    const dplCust  = totals?.total_cust_a?.val ?? 0;
    const dplCount = totals?.total_outages ?? dplOutages.length;
    const decCust  = decList.reduce((s,o)=>s+(o.affected||0),0);
    const decCount = decList.filter(o=>o.affected>0).length;

    document.getElementById("s-out").textContent  = (dplCount + decCount).toLocaleString();
    document.getElementById("s-cust").textContent = (dplCust + decCust).toLocaleString();
    document.getElementById("s-dpl").textContent  = dplCust.toLocaleString();
    document.getElementById("s-dec").textContent  = decCust.toLocaleString();

    const genAt = dplSummary?.summaryFileData?.date_generated || new Date().toISOString();
    const age   = Math.floor((Date.now()-new Date(genAt).getTime())/60000);
    document.getElementById("ts").textContent = "Data from " + fmt(genAt) + " (" + (age<60?age+"m ago":Math.floor(age/60)+"h ago") + ")";
    badge.textContent = age < 30 ? "LIVE" : "STALE";
    badge.className   = age < 30 ? "badge b-live" : "badge b-stale";

    document.getElementById("empty").style.display = allItems.length === 0 ? "block" : "none";

    // ── Side panel ──
    const sorted = [...allItems].sort((a,b)=>b.n-a.n);
    document.getElementById("panel").innerHTML = sorted.slice(0,25).map(p => {
      const isDec = p.provider === "DEC";
      return `<div class="card" onclick="map.flyTo([${p.lat},${p.lng}],12)">
        <div class="card-top">
          <span class="prov ${isDec?'prov-e':'prov-d'}">${p.pName}</span>
          <span class="card-n" style="color:${p.s.c}">${p.n.toLocaleString()}</span>
        </div>
        ${isDec ? `<div class="card-r"><span class="l">ZIP</span><span class="v">${p.zip}</span></div>` : ''}
        <div class="card-r"><span class="l">Cause</span><span class="v">${p.cause||'—'}</span></div>
        <div class="card-r"><span class="l">Since</span><span class="v">${fmt(p.start_time)}</span></div>
        <div class="card-r"><span class="l">ETA</span><span class="v">${fmt(p.etr)}</span></div>
      </div>`;
    }).join("");

  } catch(e) {
    console.error("Load failed:", e);
    document.getElementById("badge").textContent = "ERROR";
    document.getElementById("badge").className = "badge b-err";
    document.getElementById("ts").textContent = e.message || "Unknown error. Check console.";
  }
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
